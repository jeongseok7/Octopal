stages:
  - build
  - publish

variables:
  PNPM_VERSION: "10.8.1"
  NODE_VERSION: "22"

# ──────────────────────────────────────────────
# macOS Universal build
# Requires: self-hosted macOS runner with tags=["macos"]
# ──────────────────────────────────────────────
build:macos:
  stage: build
  tags: [macos]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  variables:
    RUST_TARGETS: "aarch64-apple-darwin,x86_64-apple-darwin"
    TAURI_ARGS: "--target universal-apple-darwin"
    BUNDLE_ROOT: "src-tauri/target/universal-apple-darwin/release/bundle"
  before_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
    - npm install -g pnpm@${PNPM_VERSION}
  script:
    - pnpm install --frozen-lockfile
    - |
        export APPLE_SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY}"
        export APPLE_CERTIFICATE="${APPLE_CERTIFICATE}"
        export APPLE_CERTIFICATE_PASSWORD="${APPLE_CERTIFICATE_PASSWORD}"
        export APPLE_ID="${APPLE_ID}"
        export APPLE_PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD}"
        export APPLE_TEAM_ID="${APPLE_TEAM_ID}"
        export TAURI_SIGNING_PRIVATE_KEY="${TAURI_SIGNING_PRIVATE_KEY}"
        export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
        pnpm exec tauri build ${TAURI_ARGS}
  artifacts:
    paths:
      - src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
      - src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
      - src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
    expire_in: 5 days

# ──────────────────────────────────────────────
# Windows build
# Requires: self-hosted Windows runner with tags=["windows"]
# ──────────────────────────────────────────────
build:windows:
  stage: build
  tags: [windows]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  variables:
    TAURI_ARGS: ""
    BUNDLE_ROOT: "src-tauri/target/release/bundle"
  before_script:
    - npm install -g pnpm@${PNPM_VERSION}
  script:
    - pnpm install --frozen-lockfile
    - pnpm exec tauri build
  artifacts:
    paths:
      - src-tauri/target/release/bundle/msi/*.msi
      - src-tauri/target/release/bundle/msi/*.msi.zip
      - src-tauri/target/release/bundle/msi/*.msi.zip.sig
      - src-tauri/target/release/bundle/nsis/*.exe
      - src-tauri/target/release/bundle/nsis/*.nsis.zip
      - src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
    expire_in: 5 days

# ──────────────────────────────────────────────
# Publish release + generate latest.json
# Uses official release-cli image
# ──────────────────────────────────────────────
publish:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:macos
    - build:windows
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  before_script:
    - apk add --no-cache bash curl jq
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    - NOTES="Release v${VERSION}"
    - BASE_URL="${CI_PROJECT_URL}/-/releases/${CI_COMMIT_TAG}/downloads"

    # Collect artifact files
    - mkdir -p dist-assets
    - find . -path "*/bundle/*" -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.msi.zip" -o -name "*.exe" -o -name "*.nsis.zip" -o -name "*.app.tar.gz" -o -name "*.sig" \) -exec cp {} dist-assets/ \; 2>/dev/null || true
    - echo "=== Collected assets ===" && ls -lR dist-assets/

    # Generate latest.json for Tauri updater (pointing to GitLab release downloads)
    - |
        MAC_SIG=""
        MAC_SIG_FILE=$(find dist-assets -name "*.app.tar.gz.sig" | head -1)
        if [ -f "$MAC_SIG_FILE" ]; then MAC_SIG=$(cat "$MAC_SIG_FILE"); fi

        MAC_TAR=$(find dist-assets -name "*.app.tar.gz" ! -name "*.sig" | head -1)
        MAC_TAR_NAME=$(basename "$MAC_TAR" 2>/dev/null || echo "")

        WIN_NSIS_SIG=""
        WIN_NSIS_SIG_FILE=$(find dist-assets -name "*.nsis.zip.sig" | head -1)
        if [ -f "$WIN_NSIS_SIG_FILE" ]; then WIN_NSIS_SIG=$(cat "$WIN_NSIS_SIG_FILE"); fi

        WIN_NSIS_ZIP=$(find dist-assets -name "*.nsis.zip" ! -name "*.sig" | head -1)
        WIN_NSIS_ZIP_NAME=$(basename "$WIN_NSIS_ZIP" 2>/dev/null || echo "")

        cat > dist-assets/latest.json <<ENDJSON
        {
          "version": "${VERSION}",
          "notes": "${NOTES}",
          "pub_date": "${PUB_DATE}",
          "platforms": {
            "darwin-aarch64": {
              "signature": "${MAC_SIG}",
              "url": "${BASE_URL}/${MAC_TAR_NAME}"
            },
            "darwin-x86_64": {
              "signature": "${MAC_SIG}",
              "url": "${BASE_URL}/${MAC_TAR_NAME}"
            },
            "windows-x86_64": {
              "signature": "${WIN_NSIS_SIG}",
              "url": "${BASE_URL}/${WIN_NSIS_ZIP_NAME}"
            }
          }
        }
        ENDJSON
    - echo "=== latest.json ===" && cat dist-assets/latest.json

    # Create GitLab Release with all assets
    - |
        ASSETS=""
        for f in dist-assets/*; do
          [ -f "$f" ] && ASSETS="${ASSETS} --asset-link {\"name\":\"$(basename $f)\",\"url\":\"${BASE_URL}/$(basename $f)\"}"
        done
        release-cli create \
          --name "v${VERSION}" \
          --tag-name "$CI_COMMIT_TAG" \
          --description "Release v${VERSION}" \
          $ASSETS
  artifacts:
    paths:
      - dist-assets/
    expire_in: 5 days
